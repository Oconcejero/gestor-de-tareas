{% extends 'base.html' %}

{% load static %}
{% block content %}
<link rel="stylesheet" href="{% static 'tareas/login.css' %}">

<h1>Iniciar sesión</h1>

<form class="form_login" method="post">
  {% csrf_token %}

    <div class="campo">
      <label>Nombre de usuario</label>
      {{ form.username }}
    </div>

    <div class="campo">
      <label>Contraseña</label>
      {{ form.password }}
    </div>
  
  <button type="submit">Entrar</button>

  <a class="register" href="{% url 'register' %}">No tienes cuenta?</a>

</form>
{% endblock %}
